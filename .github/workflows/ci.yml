# Give me a break — CI 持续集成核心流水线（test + build）。
# 维度边界（正交分解）：本 workflow 只负责测试与编译验证。
#   - 文档/链接/Mermaid 门禁由 .github/workflows/lint.yml 负责，互不耦合。
#   - 发布（装配/签名/公证/Release）由 .github/workflows/release.yml 负责；本 workflow build job
#     仅验证 release 编译，并通过 artifact 预留产物。
# 单一事实源：环境准备统一委托 .github/actions/setup-macos-swift。
name: CI

on:
  push:
    branches: [master, "feature/**"]
    paths:
      - "Sources/**"
      - "tests/**"
      - "scripts/**"
      - "Resources/**"
      - "Package.swift"
      - "Makefile"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-macos-swift/**"
      - "windows/**"
      - "shared/**"
  pull_request:
    branches: [master, "feature/**"]
    paths:
      - "Sources/**"
      - "tests/**"
      - "scripts/**"
      - "Resources/**"
      - "Package.swift"
      - "Makefile"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-macos-swift/**"
      - "windows/**"
      - "shared/**"

# 取消旧运行：PR 用 issue number 保证同 PR 内串行去重；push 用 ref。
# 同 PR/分支新 push 抢占 in-progress 运行，节省 macOS runner 额度（最贵档位之一）。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.number || github.ref }}
  cancel-in-progress: true

# 最小权限原则：CI 无写 repo 需求（artifact 上传走 GITHUB_TOKEN 隐式授权）。
permissions:
  contents: read

jobs:
  test:
    name: Test (GiveMeABreakTests runner)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup macOS + Swift (cached)
        uses: ./.github/actions/setup-macos-swift

      - name: Run tests
        # make test → swift run GiveMeABreakTests；自建运行器，失败时 exit(1)（tests/main.swift 末行）。
        # GiveMeABreakTests 仅依赖纯 Foundation 的 GiveMeABreakEngine，无系统权限、无 GUI，CI 安全可跑。
        run: make test

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-debug-${{ github.run_id }}
          path: .build/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build (release compile check)
    runs-on: macos-15
    # 串行而非并行（省 macOS 额度）：test job 的 swift run 已隐含编译 Engine+Tests；
    # build job 验证 release 全量编译（含 GiveMeABreakIntegrations/GiveMeABreak），缓存全热下秒级完成。
    # 若需 fail-fast（编译错误立即暴露），可删除本行改并行。
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup macOS + Swift (cached)
        uses: ./.github/actions/setup-macos-swift

      - name: Build (release)
        # make build → swift build -c release。注：不调 make app，其 icon 步骤依赖 NSImage 离屏渲染，
        # 在 headless runner 高风险失败；图标装配留给 release.yml（macos runner 有 window server）。
        run: make build

      - name: Upload release binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: give-me-a-break-binary-${{ github.sha }}
          path: .build/release/GiveMeABreak
          if-no-files-found: error
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────
  # Windows · C# net8.0 逻辑层测试（Phase 0 核心 + Phase 1 Win32 互操作层）。
  # 测 windows/GiveMeABreakEngine.sln（不含 net8.0-windows 壳）。Swift Sources/ 零改动。
  dotnet-test:
    name: Test (C# net8.0 · Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 8
        # NOTE: 暂用 tag，待人工/Dependabot SHA-pin 对齐仓库其余 action 规范。
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Run tests (net8.0 core + Win32 logic layer)
        # 引擎核心 25 + Win32 互操作 12（粉噪音/空闲回绕/媒体键）。本地已验证 37 通过。
        # 两端共用 shared/ 黄金 fixture 保证 FSM 不漂移。
        run: dotnet test windows/GiveMeABreakEngine.sln -c Release --nologo

  # ────────────────────────────────────────────────────────────────────────
  # macOS · C# net8.0 逻辑层测试（Phase 1）：证明 Win32 互操作层 + 引擎核心真跨平台可编译可测。
  # 与 dotnet-test(windows) 跑同一批 net8.0 测试，双端一致 = 跨平台成立。本地可复现（无 Windows 也能验证）。
  dotnet-test-mac:
    name: Test (C# net8.0 · macOS 跨平台)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Run tests (net8.0 core + Win32 logic layer)
        # 仅 net8.0 sln（不含 net8.0-windows 壳），macOS 可编译。
        run: dotnet test windows/GiveMeABreakEngine.sln -c Release --nologo

  # ────────────────────────────────────────────────────────────────────────
  # Windows · Phase 1 WPF 壳编译（L2）：验证 net8.0-windows 工程可编译、publish 出 exe。
  # P/Invoke 声明 / WPF XAML / NAudio·H.NotifyIcon 依赖版本的暴露点。macOS 无法本地验证，必经 CI。
  dotnet-build-shell:
    name: Build (WPF shell · net8.0-windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Build shell (release)
        run: dotnet build windows/GiveMeABreakShell/GiveMeABreakShell.csproj -c Release --nologo
      - name: Publish self-contained (win-x64)
        run: dotnet publish windows/GiveMeABreakShell/GiveMeABreakShell.csproj -c Release -r win-x64 --self-contained -o ./publish --nologo
      - name: Upload shell artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: give-me-a-break-shell-${{ github.sha }}
          path: ./publish/
          if-no-files-found: error
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────
  # Windows · Phase 1 headless 烟测（L3）：壳启动不崩 + 引擎装配闭环。
  # GIVEMEABREAK_HEADLESS 跳过托盘/WASAPI 真实实例化（无 shell/无设备）；GIVEMEABREAK_DEBUG 极速配置触发相位转移。
  # 能证：装配成功 + 无未处理异常。不能证：托盘可见/出声/QQ音乐响应（归用户真机验收）。
  dotnet-smoke-shell:
    name: Smoke (WPF shell headless · run 6s)
    runs-on: windows-latest
    needs: dotnet-build-shell
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Publish
        run: dotnet publish windows/GiveMeABreakShell/GiveMeABreakShell.csproj -c Release -r win-x64 --self-contained -o ./publish --nologo
      - name: Headless run (expect装配成功 + 无未处理异常)
        shell: pwsh
        run: |
          $env:GIVEMEABREAK_HEADLESS = "1"
          $env:GIVEMEABREAK_DEBUG = "1"
          $p = Start-Process -FilePath ".\publish\GiveMeABreakShell.exe" -PassThru -NoNewWindow -RedirectStandardOutput shell-out.log -RedirectStandardError shell-err.log
          Start-Sleep -Seconds 6
          if (-not $p.HasExited) {
            Write-Host "进程存活 6s（headless 应 5s 自退）→ 强制结束（视为正常）"
            Stop-Process -Id $p.Id -Force
          } else {
            Write-Host "进程已自退，ExitCode=$($p.ExitCode)"
          }
          Write-Host "===== STDOUT ====="; Get-Content shell-out.log -ErrorAction SilentlyContinue
          Write-Host "===== STDERR ====="; Get-Content shell-err.log -ErrorAction SilentlyContinue
          $log = Get-Content shell-out.log -Raw -ErrorAction SilentlyContinue
          if (-not $log) { Write-Error "无 stdout 日志，进程可能启动即崩"; exit 1 }
          if ($log -notmatch "ASSEMBLY_OK") { Write-Error "未见 ASSEMBLY_OK 标记，装配阶段异常"; exit 1 }
          if ($log -notmatch "STARTUP_OK") { Write-Error "未见 STARTUP_OK 标记"; exit 1 }
          # Phase 2：遮罩 Show 被调用（OK 或降级 FAIL 任一），证明 FullscreenOverlayController 接入闭环
          if ($log -notmatch "OVERLAY_SHOW_(OK|FAIL)") { Write-Error "未见 OVERLAY_SHOW 标记，遮罩 Show 未触发（Phase 2）"; exit 1 }
          # Phase 3：graphClientId 空（GIVEMEABREAK_DEBUG）→ EmptyCalendarProvider 降级，证明条件注入走对路径
          if ($log -notmatch "CALENDAR_DEGRADED") { Write-Error "未见 CALENDAR_DEGRADED 标记，日历条件注入未走降级（Phase 3）"; exit 1 }
          $err = Get-Content shell-err.log -Raw -ErrorAction SilentlyContinue
          if ($err -match "Unhandled|Exception:") { Write-Error "stderr 含未处理异常：$err"; exit 1 }
          Write-Host "headless 烟测通过：装配成功 + 无未处理异常"
      - name: Dump logs on failure
        if: failure()
        run: |
          Write-Host "===== STDOUT ====="; Get-Content shell-out.log -ErrorAction SilentlyContinue
          Write-Host "===== STDERR ====="; Get-Content shell-err.log -ErrorAction SilentlyContinue
